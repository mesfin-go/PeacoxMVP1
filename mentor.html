<script>
        const SUPABASE_URL = 'https://lgmzqktvkvyfycyrhrbt.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxnbXpxa3R2a3Z5ZnljeXJocmJ0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA1NDA2OTUsImV4cCI6MjA5NjExNjY5NX0.oDSGz97-15p3OFhHTPALbgnJ1lDRJNBM9ayA17uF2Lc';
        
        // FIX: Using supabaseClient to prevent crashes
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Core logic to fetch data and protect the page
        async function loadDashboard() {
            const { data: { user }, error: authError } = await supabaseClient.auth.getUser();
            if (authError || !user) { window.location.href = 'index.html'; return; }

            const { data: profile } = await supabaseClient.from('profiles').select('*').eq('id', user.id).single();

            // Security: If not a mentor, redirect to the right place
            if (profile && profile.role !== 'mentor') {
                window.location.href = profile.role === 'manager' ? 'pm.html' : 'student.html';
                return;
            }

            // Inject the dynamic data into the UI
            if (profile) {
                const firstName = profile.first_name || 'Peacox';
                const lastName = profile.last_name || 'Mentor';
                document.getElementById('mentor-name').innerText = `Dr. ${firstName} ${lastName}`;
                document.getElementById('mentor-avatar').innerText = (profile.avatar_initials || (firstName[0]+lastName[0])).toUpperCase();
            }
        }

        // Modal Logic
        function openModal(title) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalOverlay').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('modalOverlay').style.display = 'none';
        }

        // --- NEW BULLETPROOF LOGOUT SCRIPT ---
        const logoutBtn = document.getElementById('logout-btn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', async () => {
                logoutBtn.innerText = 'Signing out...'; // Visual feedback
                try {
                    await supabaseClient.auth.signOut();
                } catch (error) {
                    console.error("Logout error:", error);
                } finally {
                    window.location.replace('index.html'); // Guaranteed redirect
                }
            });
        }

        // Initialize the page
        loadDashboard();
    </script>
